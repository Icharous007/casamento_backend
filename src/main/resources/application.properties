# ==============================================================================
# Casamento Backend — Application Configuration
# Profiles: dev (default), test, prod
# ==============================================================================

# ── Application ────────────────────────────────────────────────────────────────
quarkus.application.name=casamento-backend
quarkus.http.port=8080

# ── CORS ───────────────────────────────────────────────────────────────────────
quarkus.http.cors.enabled=true
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
quarkus.http.cors.headers=Content-Type,Authorization,X-Guest-Access-Token
quarkus.http.cors.exposed-headers=Content-Disposition,X-Trace-Id
quarkus.http.cors.access-control-max-age=24H

# ── Datasource ─────────────────────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:casamento}
quarkus.datasource.password=${DB_PASSWORD:casamento}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/casamento}
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.min-size=2

# ── Flyway ─────────────────────────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=false

# ── JWT ────────────────────────────────────────────────────────────────────────
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION:META-INF/resources/publicKey.pem}
mp.jwt.verify.issuer=${JWT_ISSUER:https://casamento.local}
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_LOCATION:META-INF/resources/privateKey.pem}
smallrye.jwt.new-token.lifespan=3600
smallrye.jwt.new-token.issuer=${JWT_ISSUER:https://casamento.local}

# ── Mailer ─────────────────────────────────────────────────────────────────────
quarkus.mailer.host=${SMTP_HOST:localhost}
quarkus.mailer.port=${SMTP_PORT:1025}
quarkus.mailer.from=${SMTP_FROM:noreply@casamento.local}
quarkus.mailer.username=${SMTP_USERNAME:}
quarkus.mailer.password=${SMTP_PASSWORD:}
quarkus.mailer.start-tls=OPTIONAL
quarkus.mailer.auth-methods=LOGIN PLAIN

# ── Health ─────────────────────────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/q/health

# ── Hibernate ──────────────────────────────────────────────────────────────────
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# ── Application-specific ───────────────────────────────────────────────────────
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.timezone=${APP_TIMEZONE:America/Sao_Paulo}
app.confirmation-phrase=${APP_CONFIRMATION_PHRASE:APAGAR EVENTO}

# R2 / S3-compatible storage
app.r2.endpoint=${R2_ENDPOINT:http://localhost:9000}
app.r2.access-key=${R2_ACCESS_KEY:minioadmin}
app.r2.secret-key=${R2_SECRET_KEY:minioadmin}
app.r2.bucket=${R2_BUCKET:casamento}
app.r2.region=${R2_REGION:auto}

# Upload limits (media + audio)
quarkus.http.limits.max-body-size=55M

# Email limits
app.email.daily-limit=${EMAIL_DAILY_LIMIT:100}
app.email.batch-size=${EMAIL_BATCH_SIZE:50}
app.email.max-retries=${EMAIL_MAX_RETRIES:3}

# Rate limiting (requests per minute per IP)
app.rate-limit.guest-resolve=${RATE_LIMIT_GUEST_RESOLVE:10}
app.rate-limit.admin-login=${RATE_LIMIT_ADMIN_LOGIN:10}
app.rate-limit.forgot-password=${RATE_LIMIT_FORGOT_PASSWORD:5}

# Internal jobs secret (dev/test only — prod uses IAM/OIDC)
app.jobs.secret=${JOB_SECRET:dev-job-secret-change-in-prod}

# ==============================================================================
# DEV Profile
# ==============================================================================
# Allow all origins in dev (regex wildcard — safe for local development only)
%dev.quarkus.http.cors.origins=/.*/
# Disable proactive auth so unauthenticated endpoints (e.g. /login) are not eagerly rejected
%dev.quarkus.http.auth.proactive=false
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/casamento
%dev.quarkus.datasource.username=casamento
%dev.quarkus.datasource.password=casamento
%dev.quarkus.flyway.clean-at-start=false
%dev.quarkus.hibernate-orm.log.sql=false
%dev.quarkus.log.level=INFO
%dev.quarkus.log.category."br.com.casamento".level=DEBUG
%dev.quarkus.mailer.mock=true

# ==============================================================================
# TEST Profile
# ==============================================================================
%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/casamento_test
%test.quarkus.datasource.username=casamento
%test.quarkus.datasource.password=casamento
%test.quarkus.flyway.clean-at-start=true
%test.quarkus.flyway.migrate-at-start=true
%test.quarkus.mailer.mock=true
%test.quarkus.log.level=WARN
%test.quarkus.log.category."br.com.casamento".level=INFO
%test.app.r2.endpoint=http://localhost:9001

# ==============================================================================
# PROD Profile
# ==============================================================================
%prod.quarkus.datasource.jdbc.url=${DB_URL}
%prod.quarkus.datasource.username=${DB_USERNAME}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.flyway.clean-at-start=false
%prod.quarkus.http.cors.origins=${CORS_ALLOWED_ORIGINS}
%prod.quarkus.log.level=WARN
%prod.quarkus.log.category."br.com.casamento".level=INFO
%prod.quarkus.log.console.json=true
%prod.quarkus.mailer.start-tls=REQUIRED
